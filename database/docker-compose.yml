services:
  mysql:
    image: datajoint/mysql:8.0
    container_name: spyglass-workshop-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
      # Persistent data volume — survives container restarts.
      - workshop_data:/var/lib/mysql
    command: >
      --activate_all_roles_on_login=ON
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

volumes:
  workshop_data:
    name: spyglass-workshop-data
